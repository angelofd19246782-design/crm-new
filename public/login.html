<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CRM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0f1c;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -25%; left: 15%;
      width: 65vw; height: 65vw;
      background: radial-gradient(ellipse, rgba(37,99,235,.18) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%; right: 5%;
      width: 50vw; height: 50vw;
      background: radial-gradient(ellipse, rgba(99,102,241,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 36px 34px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 40px 100px rgba(0,0,0,.62), 0 0 0 1px rgba(255,255,255,.07);
      position: relative;
      z-index: 1;
    }

    .card-logo {
      width: 44px; height: 44px;
      background: linear-gradient(145deg, #3b82f6, #1d4ed8);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 22px rgba(37,99,235,.40);
      margin-bottom: 24px;
    }
    .card-logo svg { width: 22px; height: 22px; color: #fff; }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0d1526;
      letter-spacing: -.04em;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: .63rem;
      font-weight: 700;
      color: #56687e;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #dbe3f0;
      border-radius: 9px;
      font-size: .9rem;
      font-family: inherit;
      color: #0d1526;
      outline: none;
      transition: border-color .13s, box-shadow .13s, background .13s;
      background: #f6f8fd;
    }

    .field input:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.14);
    }

    .submit {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: linear-gradient(175deg, #3b82f6 0%, #1d4ed8 100%);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: .9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: box-shadow .15s, background .15s, transform .1s;
      box-shadow: 0 4px 14px rgba(37,99,235,.38), 0 2px 6px rgba(37,99,235,.18);
      letter-spacing: -.01em;
    }
    .submit:hover { background: linear-gradient(175deg, #2563eb 0%, #1741b8 100%); box-shadow: 0 6px 22px rgba(37,99,235,.48); }
    .submit:active { transform: scale(.98); }
    .submit:disabled { opacity: .65; cursor: not-allowed; }

    .error {
      margin-top: 12px;
      padding: 10px 13px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: .81rem;
      color: #991b1b;
      display: none;
    }

    .footer-link {
      display: block;
      margin-top: 22px;
      text-align: center;
      font-size: .78rem;
      color: #94a3b8;
      text-decoration: none;
      transition: color .13s;
    }
    .footer-link:hover { color: #56687e; }

    #langToggle {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 5px 12px; border: 1.5px solid #dbe3f0; border-radius: 20px;
      background: #f6f8fd; cursor: pointer; font-size: .7rem; font-weight: 700;
      letter-spacing: .07em; color: #56687e; font-family: inherit; line-height: 1;
      transition: border-color .13s, color .13s, background .13s;
      user-select: none; white-space: nowrap; box-shadow: 0 1px 3px rgba(13,21,38,.05);
    }
    #langToggle:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
    #langToggle:active { transform: scale(.95); }

    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 0; }
      .card { padding: 32px 20px 28px; border-radius: 0; width: 100%; max-width: 100%; min-height: 100svh; }
      .field input { font-size: 1rem; }
      .submit { font-size: 1rem; padding: 13px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-logo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5"/></svg>
    </div>
    <div class="card-top">
      <div class="card-title" id="loginTitle">Sign In</div>
      <button id="langToggle" onclick="toggleLanguage()">RU</button>
    </div>
    <form id="loginForm">
      <div class="field">
        <label id="lblUsername">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter username" required>
      </div>
      <div class="field">
        <label id="lblPassword">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="submit" id="submitBtn">Sign In</button>
      <div class="error" id="errorMsg"></div>
    </form>
    <a class="footer-link" href="/bot" id="clientFormLink">Open client form</a>
  </div>

  <script>
    let lang = localStorage.getItem('lang') || 'en';

    function t(en, ru) { return lang === 'ru' ? ru : en; }

    function toggleLanguage() {
      lang = lang === 'en' ? 'ru' : 'en';
      localStorage.setItem('lang', lang);
      applyLang();
    }

    function applyLang() {
      document.getElementById('langToggle').textContent = lang === 'en' ? 'RU' : 'EN';
      document.getElementById('loginTitle').textContent = t('Sign In', 'Вход');
      document.getElementById('lblUsername').textContent = t('Username', 'Имя пользователя');
      document.getElementById('lblPassword').textContent = t('Password', 'Пароль');
      document.getElementById('submitBtn').textContent = t('Sign In', 'Войти');
      document.getElementById('username').placeholder = t('Enter username', 'Введите имя');
      document.getElementById('password').placeholder = t('Enter password', 'Введите пароль');
      document.getElementById('clientFormLink').textContent = t('Open client form', 'Открыть форму клиента');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('errorMsg');
      const btn    = document.getElementById('submitBtn');
      errEl.style.display = 'none';
      btn.disabled = true;
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || t('Login failed', 'Ошибка входа');
          errEl.style.display = 'block';
          btn.disabled = false;
          return;
        }
        window.location.href = data.role === 'admin' ? '/admin' : '/employee';
      } catch (_) {
        errEl.textContent = t('Connection error. Please try again.', 'Ошибка соединения. Попробуйте снова.');
        errEl.style.display = 'block';
        btn.disabled = false;
      }
    });

    applyLang();
  </script>
</body>
</html>
