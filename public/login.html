<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CRM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0c1120 0%, #0f1e38 50%, #0c1120 100%);
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -.03em;
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: .68rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: .95rem;
      font-family: inherit;
      color: #0f172a;
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
      background: #f8fafc;
    }

    .field input:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }

    .submit {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
      box-shadow: 0 4px 14px rgba(37,99,235,.35);
      letter-spacing: -.01em;
    }
    .submit:hover { box-shadow: 0 6px 20px rgba(37,99,235,.45); }
    .submit:active { transform: scale(.98); }
    .submit:disabled { opacity: .65; cursor: not-allowed; }

    .error {
      margin-top: 14px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 9px;
      font-size: .82rem;
      color: #dc2626;
      display: none;
    }

    .footer-link {
      display: block;
      margin-top: 24px;
      text-align: center;
      font-size: .79rem;
      color: #94a3b8;
      text-decoration: none;
      transition: color .15s;
    }
    .footer-link:hover { color: #64748b; }

    #langToggle {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 5px 12px; border: 1.5px solid #e2e8f0; border-radius: 20px;
      background: #fff; cursor: pointer; font-size: .71rem; font-weight: 700;
      letter-spacing: .06em; color: #64748b; font-family: inherit; line-height: 1;
      transition: border-color .15s, color .15s, background .15s;
      user-select: none; white-space: nowrap; box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    #langToggle:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
    #langToggle:active { transform: scale(.95); }

    .card-logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(37,99,235,.35);
      margin-bottom: 22px;
    }
    .card-logo svg { width: 20px; height: 20px; color: #fff; }

    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 0; }
      .card { padding: 32px 20px 24px; border-radius: 0; width: 100%; max-width: 100%; min-height: 100vh; }
      .field input { font-size: 1rem; }
      .submit { font-size: 1rem; padding: 13px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-logo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5"/></svg>
    </div>
    <div class="card-top">
      <div class="card-title" id="loginTitle">Sign In</div>
      <button id="langToggle" onclick="toggleLanguage()">RU</button>
    </div>
    <form id="loginForm">
      <div class="field">
        <label id="lblUsername">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter username" required>
      </div>
      <div class="field">
        <label id="lblPassword">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="submit" id="submitBtn">Sign In</button>
      <div class="error" id="errorMsg"></div>
    </form>
    <a class="footer-link" href="/bot" id="clientFormLink">Open client form</a>
  </div>

  <script>
    let lang = localStorage.getItem('lang') || 'en';

    function t(en, ru) { return lang === 'ru' ? ru : en; }

    function toggleLanguage() {
      lang = lang === 'en' ? 'ru' : 'en';
      localStorage.setItem('lang', lang);
      applyLang();
    }

    function applyLang() {
      document.getElementById('langToggle').textContent = lang === 'en' ? 'RU' : 'EN';
      document.getElementById('loginTitle').textContent = t('Sign In', 'Вход');
      document.getElementById('lblUsername').textContent = t('Username', 'Имя пользователя');
      document.getElementById('lblPassword').textContent = t('Password', 'Пароль');
      document.getElementById('submitBtn').textContent = t('Sign In', 'Войти');
      document.getElementById('username').placeholder = t('Enter username', 'Введите имя');
      document.getElementById('password').placeholder = t('Enter password', 'Введите пароль');
      document.getElementById('clientFormLink').textContent = t('Open client form', 'Открыть форму клиента');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('errorMsg');
      const btn    = document.getElementById('submitBtn');
      errEl.style.display = 'none';
      btn.disabled = true;
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || t('Login failed', 'Ошибка входа');
          errEl.style.display = 'block';
          btn.disabled = false;
          return;
        }
        window.location.href = data.role === 'admin' ? '/admin' : '/employee';
      } catch (_) {
        errEl.textContent = t('Connection error. Please try again.', 'Ошибка соединения. Попробуйте снова.');
        errEl.style.display = 'block';
        btn.disabled = false;
      }
    });

    applyLang();
  </script>
</body>
</html>
