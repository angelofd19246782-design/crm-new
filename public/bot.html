<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit a Request</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #2563eb;
      --blue-dark:   #1d4ed8;
      --blue-light:  #eff6ff;
      --blue-ring:   rgba(37,99,235,.14);
      --text:        #0d1526;
      --text-2:      #374151;
      --muted:       #6b7280;
      --subtle:      #9ca3af;
      --border:      #e4e9f2;
      --border-dark: #c6d0e2;
      --bg:          #f2f5fb;
      --surface:     #ffffff;
      --success:     #059669;
      --danger:      #dc2626;
      --danger-light:#fee2e2;
      --ease:        cubic-bezier(.4,0,.2,1);
      --r:           10px;
      --r-lg:        14px;
      --r-xl:        20px;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh; min-height: 100svh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 36px 20px 64px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page { width: 100%; max-width: 520px; }

    /* ── Brand header ── */
    .brand {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding: 0 2px;
    }
    .brand-left { display: flex; align-items: center; gap: 10px; }
    .brand-logo {
      width: 34px; height: 34px;
      background: linear-gradient(145deg, #3b82f6, #1d4ed8);
      border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(37,99,235,.30);
    }
    .brand-logo svg { width: 16px; height: 16px; color: #fff; }
    .brand-name { font-size: .92rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; }

    .lang-btn {
      display: inline-flex; align-items: center;
      padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--surface); cursor: pointer; font-size: .7rem; font-weight: 700;
      letter-spacing: .07em; color: var(--muted); font-family: inherit;
      transition: border-color .13s, color .13s, background .13s;
      user-select: none;
    }
    .lang-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--r-xl);
      box-shadow: 0 2px 12px rgba(13,21,38,.07), 0 8px 32px rgba(13,21,38,.06), 0 0 0 1px rgba(13,21,38,.04);
      overflow: hidden;
    }

    /* ── Step indicator ── */
    .step-bar {
      padding: 22px 28px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .step-label { font-size: .74rem; font-weight: 600; color: var(--muted); letter-spacing: .01em; }
    .step-dots { display: flex; gap: 5px; align-items: center; }
    .step-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border);
      transition: background .2s var(--ease), transform .2s var(--ease);
    }
    .step-dot.active { background: var(--blue); transform: scale(1.28); }
    .step-dot.done   { background: #93c5fd; }

    .step-track { height: 2px; background: #eaeeF7; margin: 10px 0 0; }
    .step-track-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      transition: width .38s var(--ease);
    }

    /* ── Form body ── */
    .form-body { padding: 26px 28px 20px; }

    .step-title {
      font-size: 1.2rem; font-weight: 800; color: var(--text);
      letter-spacing: -.03em; margin-bottom: 6px; line-height: 1.25;
    }
    .step-desc {
      font-size: .84rem; color: var(--muted); margin-bottom: 22px; line-height: 1.55;
    }

    .field-group { display: flex; flex-direction: column; gap: 18px; }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label {
      display: flex; align-items: baseline; gap: 5px;
      font-size: .7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .field-opt {
      font-size: .64rem; font-weight: 600; color: var(--subtle);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .field input, .field textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      font-size: .95rem; font-family: inherit; color: var(--text);
      background: #fafbfd; line-height: 1.5;
      outline: none;
      transition: border-color .13s var(--ease), box-shadow .13s var(--ease), background .13s;
    }
    .field input:focus, .field textarea:focus {
      border-color: var(--blue); background: var(--surface);
      box-shadow: 0 0 0 3px var(--blue-ring);
    }
    .field input.err { border-color: var(--danger); }
    .field textarea { resize: vertical; min-height: 108px; }
    .field-err {
      font-size: .74rem; color: var(--danger); font-weight: 500;
      display: none;
    }
    .field-err.show { display: block; }

    /* ── Drop zone ── */
    .dropzone {
      border: 2px dashed var(--border-dark); border-radius: var(--r-lg);
      padding: 30px 20px; text-align: center;
      position: relative; cursor: pointer; background: #fafbfd;
      transition: border-color .18s var(--ease), background .18s var(--ease);
    }
    .dropzone:hover, .dropzone.over {
      border-color: var(--blue); background: var(--blue-light);
    }
    .dropzone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .dz-icon { margin-bottom: 10px; }
    .dz-icon svg { width: 26px; height: 26px; color: var(--subtle); }
    .dz-title { font-size: .88rem; font-weight: 700; color: var(--text-2); margin-bottom: 4px; }
    .dz-sub   { font-size: .76rem; color: var(--muted); }

    .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .file-item {
      display: flex; align-items: center; gap: 9px;
      background: var(--blue-light); border: 1px solid rgba(37,99,235,.13);
      border-radius: 8px; padding: 7px 10px;
    }
    .file-item svg { width: 14px; height: 14px; color: var(--blue); flex-shrink: 0; }
    .fi-name {
      flex: 1; font-size: .81rem; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .fi-rm {
      background: none; border: none; cursor: pointer;
      color: var(--subtle); font-size: .95rem; padding: 0 2px;
      line-height: 1; flex-shrink: 0; transition: color .12s;
    }
    .fi-rm:hover { color: var(--danger); }

    /* ── Review block ── */
    .review-block {
      background: var(--bg); border-radius: var(--r-lg);
      border: 1px solid var(--border); overflow: hidden;
    }
    .review-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
    }
    .review-row:last-child { border-bottom: none; }
    .review-lbl {
      font-size: .68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
      width: 68px; flex-shrink: 0; padding-top: 2px;
    }
    .review-val {
      flex: 1; font-size: .86rem; color: var(--text);
      line-height: 1.5; word-break: break-word;
    }
    .review-val.empty { color: var(--subtle); font-style: italic; }
    .review-edit {
      background: none; border: none; cursor: pointer;
      color: var(--blue); font-size: .73rem; font-weight: 600;
      font-family: inherit; padding: 0; white-space: nowrap;
      flex-shrink: 0; transition: color .12s;
    }
    .review-edit:hover { color: var(--blue-dark); text-decoration: underline; }

    /* Submit error */
    .submit-err {
      margin-top: 12px; padding: 10px 14px;
      background: var(--danger-light); border: 1px solid #fecaca;
      border-radius: 8px; font-size: .82rem; color: #991b1b;
    }

    /* ── Footer ── */
    .form-foot {
      padding: 4px 28px 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .btn-back {
      flex-shrink: 0; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      background: var(--surface); color: var(--text-2);
      font-size: .88rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: border-color .13s, background .13s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-back svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-back:hover { background: #f5f7fc; border-color: var(--border-dark); }
    .btn-next {
      flex: 1; padding: 13px 20px;
      background: linear-gradient(175deg, #3b82f6 0%, #1d4ed8 100%); color: #fff;
      border: none; border-radius: var(--r);
      font-size: .95rem; font-weight: 700; font-family: inherit;
      cursor: pointer; letter-spacing: -.01em;
      transition: box-shadow .13s, background .13s, transform .1s var(--ease);
      box-shadow: 0 4px 16px rgba(37,99,235,.34);
    }
    .btn-next:hover { background: linear-gradient(175deg, #2563eb 0%, #1741b8 100%); box-shadow: 0 6px 22px rgba(37,99,235,.44); }
    .btn-next:active { transform: scale(.98); }
    .btn-next:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── Trust line ── */
    .trust-line {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 0 28px 18px;
      font-size: .72rem; color: var(--subtle); border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .trust-line svg { width: 11px; height: 11px; flex-shrink: 0; opacity: .8; }

    /* ── Success screen ── */
    .success-screen {
      display: flex; flex-direction: column; align-items: center;
      padding: 52px 32px 44px; text-align: center;
    }
    .success-icon {
      width: 64px; height: 64px;
      background: linear-gradient(145deg, #10b981, #059669); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(5,150,105,.26);
      margin-bottom: 20px;
    }
    .success-icon svg { width: 30px; height: 30px; color: #fff; }
    .success-title {
      font-size: 1.28rem; font-weight: 800; color: var(--text);
      letter-spacing: -.03em; margin-bottom: 10px;
    }
    .success-msg {
      font-size: .88rem; color: var(--muted); line-height: 1.6;
      max-width: 320px; margin-bottom: 30px;
    }
    .btn-again {
      padding: 11px 22px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      background: var(--surface); color: var(--text-2);
      font-size: .84rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .13s, border-color .13s;
    }
    .btn-again:hover { background: #f5f7fc; border-color: var(--border-dark); }

    /* ── Mobile ── */
    @media (max-width: 560px) {
      body { padding: 0 0 48px; }
      .page { padding: 0 12px; }
      .brand { margin: 16px 4px 14px; }
      .step-bar { padding: 18px 20px 0; }
      .form-body { padding: 22px 20px 18px; }
      .form-foot { padding: 4px 20px 22px; }
      .trust-line { padding: 14px 20px 18px; }
      .field input, .field textarea { font-size: 1rem; padding: 13px 14px; }
      .btn-next { font-size: 1rem; padding: 14px 20px; }
      .btn-back { padding: 13px 15px; }
      .step-title { font-size: 1.08rem; }
      .success-screen { padding: 44px 24px 36px; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="brand">
    <div class="brand-left">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5"/>
        </svg>
      </div>
      <span class="brand-name" id="brandName">CRM</span>
    </div>
    <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">RU</button>
  </div>

  <div class="card" id="mainCard"></div>

</div>

<script>
// ── Rebranding ──
const COMPANY_NAME = 'CRM';

// ── State ──
const D = { name: '', phone: '', email: '', comment: '', files: [] };
let step = 1;
let fromReview = false;
let submitting = false;
let submitted  = false;
let submitErr  = '';
const STEPS    = 4;

let lang = localStorage.getItem('lang') || 'en';
function t(en, ru) { return lang === 'ru' ? ru : en; }

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleLanguage() {
  lang = lang === 'en' ? 'ru' : 'en';
  localStorage.setItem('lang', lang);
  applyLang();
}

function applyLang() {
  document.getElementById('langToggle').textContent = lang === 'en' ? 'RU' : 'EN';
  document.getElementById('brandName').textContent  = COMPANY_NAME;
  document.title = t('Submit a Request', 'Отправить заявку') + ' \u2014 ' + COMPANY_NAME;
  render();
}

// ── Render ──
function render() {
  const card = document.getElementById('mainCard');
  card.innerHTML = submitted ? successHTML() : cardHTML();
  if (!submitted) attachEvents();
  const firstInput = card.querySelector('input:not([type=file]), textarea');
  if (firstInput && !submitting) setTimeout(() => firstInput.focus(), 60);
}

function cardHTML() {
  const pct = ((step - 1) / STEPS) * 100;
  const dots = Array.from({ length: STEPS }, (_, i) => {
    const cls = i + 1 < step ? 'done' : i + 1 === step ? 'active' : '';
    return '<div class="step-dot ' + cls + '"></div>';
  }).join('');

  return (
    '<div class="step-bar">' +
      '<span class="step-label">' + esc(t('Step','Шаг')) + ' ' + step + ' ' + esc(t('of','из')) + ' ' + STEPS + '</span>' +
      '<div class="step-dots">' + dots + '</div>' +
    '</div>' +
    '<div class="step-track"><div class="step-track-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="form-body">' + stepHTML() + '</div>' +
    footHTML() +
    '<div class="trust-line">' +
      '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>' +
      '<span>' + esc(t('Your information is handled securely', 'Ваши данные обрабатываются безопасно')) + '</span>' +
    '</div>'
  );
}

function stepHTML() {
  if (step === 1) return step1HTML();
  if (step === 2) return step2HTML();
  if (step === 3) return step3HTML();
  if (step === 4) return step4HTML();
  return '';
}

function step1HTML() {
  return (
    '<div class="step-title">' + esc(t('Your contact details', 'Ваши контакты')) + '</div>' +
    '<div class="step-desc">' + esc(t('Submit your request and we will contact you shortly.', 'Отправьте заявку, и мы свяжемся с вами.')) + '</div>' +
    '<div class="field-group">' +
      '<div class="field">' +
        '<label for="f-name">' + esc(t('Full Name', 'Имя и фамилия')) + '</label>' +
        '<input id="f-name" type="text" autocomplete="name" placeholder="' + esc(t('Enter your full name…', 'Введите ваше имя…')) + '" value="' + esc(D.name) + '">' +
        '<div class="field-err" id="err-name">' + esc(t('Please enter your name', 'Укажите ваше имя')) + '</div>' +
      '</div>' +
      '<div class="field">' +
        '<label for="f-phone">' + esc(t('Phone Number', 'Номер телефона')) + '</label>' +
        '<input id="f-phone" type="tel" autocomplete="tel" placeholder="' + esc(t('+1 555 000 0000', '+7 999 000 0000')) + '" value="' + esc(D.phone) + '">' +
        '<div class="field-err" id="err-phone">' + esc(t('Please enter your phone number', 'Укажите номер телефона')) + '</div>' +
      '</div>' +
    '</div>'
  );
}

function step2HTML() {
  return (
    '<div class="step-title">' + esc(t('Additional details', 'Дополнительные сведения')) + '</div>' +
    '<div class="step-desc">' + esc(t('Both fields are optional — fill in what you can.', 'Оба поля необязательны.')) + '</div>' +
    '<div class="field-group">' +
      '<div class="field">' +
        '<label for="f-email">Email<span class="field-opt">' + esc(t('optional', 'необязательно')) + '</span></label>' +
        '<input id="f-email" type="email" autocomplete="email" placeholder="your@email.com" value="' + esc(D.email) + '">' +
      '</div>' +
      '<div class="field">' +
        '<label for="f-comment">' + esc(t('Message', 'Сообщение')) + '<span class="field-opt">' + esc(t('optional', 'необязательно')) + '</span></label>' +
        '<textarea id="f-comment" rows="4" placeholder="' + esc(t('Describe your request or question…', 'Опишите ваш запрос или вопрос…')) + '">' + esc(D.comment) + '</textarea>' +
      '</div>' +
    '</div>'
  );
}

function step3HTML() {
  const FILE_SVG = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>';
  const fileListHTML = D.files.map((f, i) =>
    '<div class="file-item">' + FILE_SVG + '<span class="fi-name">' + esc(f.name) + '</span><button class="fi-rm" data-i="' + i + '" aria-label="Remove">&#x2715;</button></div>'
  ).join('');

  return (
    '<div class="step-title">' + esc(t('Documents', 'Документы')) + '</div>' +
    '<div class="step-desc">' + esc(t('Attach any relevant files. This step is optional.', 'Прикрепите нужные файлы. Этот шаг необязателен.')) + '</div>' +
    '<div class="dropzone" id="dropzone">' +
      '<input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.txt">' +
      '<div class="dz-icon">' +
        '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>' +
      '</div>' +
      '<div class="dz-title">' + esc(t('Upload documents', 'Загрузить документы')) + '</div>' +
      '<div class="dz-sub">' + esc(t('PDF, Word, images \u00b7 max 10\u00a0MB each', 'PDF, Word, изображения \u00b7 макс. 10\u00a0МБ')) + '</div>' +
    '</div>' +
    (fileListHTML ? '<div class="file-list" id="fileList">' + fileListHTML + '</div>' : '<div class="file-list" id="fileList"></div>')
  );
}

function step4HTML() {
  const na       = t('Not provided', 'Не указано');
  const emailVal = D.email   || na;
  const commVal  = D.comment || na;
  const filesVal = D.files.length ? (D.files.length + ' ' + t('file(s)', 'файл(ов)')) : t('None', 'Нет');
  const editTxt  = esc(t('Edit', 'Изменить'));

  const emClass = v => v === na ? ' class="review-val empty"' : ' class="review-val"';

  return (
    '<div class="step-title">' + esc(t('Review your request', 'Проверьте заявку')) + '</div>' +
    '<div class="step-desc">' + esc(t('Everything look right? Submit when ready.', 'Всё верно? Отправьте, когда будете готовы.')) + '</div>' +
    '<div class="review-block">' +
      '<div class="review-row"><span class="review-lbl">' + esc(t('Name','Имя')) + '</span><span class="review-val">' + esc(D.name) + '</span><button class="review-edit" onclick="editFromReview(1)">' + editTxt + '</button></div>' +
      '<div class="review-row"><span class="review-lbl">' + esc(t('Phone','Телефон')) + '</span><span class="review-val">' + esc(D.phone) + '</span><button class="review-edit" onclick="editFromReview(1)">' + editTxt + '</button></div>' +
      '<div class="review-row"><span class="review-lbl">Email</span><span' + emClass(emailVal) + '>' + esc(emailVal) + '</span><button class="review-edit" onclick="editFromReview(2)">' + editTxt + '</button></div>' +
      '<div class="review-row"><span class="review-lbl">' + esc(t('Message','Сообщение')) + '</span><span' + emClass(commVal) + '>' + esc(commVal.length > 100 ? commVal.slice(0,100)+'\u2026' : commVal) + '</span><button class="review-edit" onclick="editFromReview(2)">' + editTxt + '</button></div>' +
      '<div class="review-row"><span class="review-lbl">' + esc(t('Files','Файлы')) + '</span><span class="review-val">' + esc(filesVal) + '</span><button class="review-edit" onclick="editFromReview(3)">' + editTxt + '</button></div>' +
    '</div>' +
    (submitErr ? '<div class="submit-err">' + esc(submitErr) + '</div>' : '')
  );
}

function footHTML() {
  const showBack = step > 1 && !submitting;
  let nextLabel;
  if (submitting)  nextLabel = t('Submitting\u2026', 'Отправка\u2026');
  else if (step === STEPS) nextLabel = t('Submit request', 'Отправить заявку');
  else             nextLabel = t('Continue', 'Продолжить');

  const backBtn = showBack
    ? '<button class="btn-back" id="btnBack">' +
        '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>' +
        esc(t('Back', 'Назад')) +
      '</button>'
    : '';

  return (
    '<div class="form-foot">' +
      backBtn +
      '<button class="btn-next" id="btnNext"' + (submitting ? ' disabled' : '') + '>' + esc(nextLabel) + '</button>' +
    '</div>'
  );
}

function successHTML() {
  return (
    '<div class="success-screen">' +
      '<div class="success-icon">' +
        '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' +
      '</div>' +
      '<div class="success-title">' + esc(t('Request submitted!', 'Заявка отправлена!')) + '</div>' +
      '<div class="success-msg">' + esc(t('Thank you for your request. We will contact you shortly.', 'Спасибо за вашу заявку. Мы свяжемся с вами в ближайшее время.')) + '</div>' +
      '<button class="btn-again" onclick="startOver()">' + esc(t('Submit another request', 'Отправить ещё одну заявку')) + '</button>' +
    '</div>'
  );
}

// ── Events ──
function attachEvents() {
  const btnNext = document.getElementById('btnNext');
  const btnBack = document.getElementById('btnBack');
  if (btnNext) btnNext.addEventListener('click', handleNext);
  if (btnBack) btnBack.addEventListener('click', handleBack);

  if (step === 3) {
    const dz       = document.getElementById('dropzone');
    const fileInp  = document.getElementById('fileInput');
    if (dz) {
      dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('over'));
      dz.addEventListener('drop',      e => { e.preventDefault(); dz.classList.remove('over'); addFiles(e.dataTransfer.files); });
    }
    if (fileInp) fileInp.addEventListener('change', () => { addFiles(fileInp.files); fileInp.value = ''; });
    document.querySelectorAll('.fi-rm').forEach(btn => {
      btn.addEventListener('click', () => { D.files.splice(+btn.dataset.i, 1); render(); });
    });
  }

  if (step === 1 || step === 2) {
    document.querySelectorAll('.field input').forEach(inp => {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); handleNext(); } });
    });
  }
}

function addFiles(files) {
  for (const f of files) {
    if (!D.files.find(x => x.name === f.name && x.size === f.size)) D.files.push(f);
  }
  render();
}

// ── Navigation ──
function saveStep() {
  if (step === 1) {
    const n = document.getElementById('f-name');
    const p = document.getElementById('f-phone');
    if (n) D.name  = n.value.trim();
    if (p) D.phone = p.value.trim();
  } else if (step === 2) {
    const e = document.getElementById('f-email');
    const c = document.getElementById('f-comment');
    if (e) D.email   = e.value.trim();
    if (c) D.comment = c.value.trim();
  }
}

function validateStep() {
  if (step !== 1) return true;
  const nameEl  = document.getElementById('f-name');
  const phoneEl = document.getElementById('f-phone');
  const errName  = document.getElementById('err-name');
  const errPhone = document.getElementById('err-phone');
  let ok = true;
  if (!nameEl.value.trim()) {
    errName.classList.add('show'); nameEl.classList.add('err'); ok = false;
  } else {
    errName.classList.remove('show'); nameEl.classList.remove('err');
  }
  if (!phoneEl.value.trim()) {
    errPhone.classList.add('show'); phoneEl.classList.add('err'); ok = false;
  } else {
    errPhone.classList.remove('show'); phoneEl.classList.remove('err');
  }
  if (!ok) { (nameEl.value.trim() ? phoneEl : nameEl).focus(); }
  return ok;
}

function handleNext() {
  saveStep();
  if (!validateStep()) return;
  if (step === STEPS) { submitApp(); return; }
  if (fromReview) { step = 4; fromReview = false; }
  else            { step++; }
  submitErr = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleBack() {
  saveStep();
  if (fromReview) { step = 4; fromReview = false; }
  else            { step = Math.max(1, step - 1); }
  submitErr = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function editFromReview(targetStep) {
  fromReview = true;
  step = targetStep;
  submitErr = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Submission ──
async function submitApp() {
  submitting = true;
  submitErr  = '';
  render();

  try {
    const res = await fetch('/api/intake', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        name:    D.name,
        phone:   D.phone,
        email:   D.email   || null,
        comment: D.comment || null,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'HTTP ' + res.status);
    }
    const { id } = await res.json();

    const failedUploads = [];
    for (const file of D.files) {
      const fd = new FormData();
      fd.append('file', file);
      const up = await fetch('/api/intake/' + id + '/attachment', { method: 'POST', body: fd });
      if (!up.ok) {
        const upErr = await up.json().catch(() => ({}));
        console.warn('Upload failed:', file.name, upErr.error || up.status);
        failedUploads.push(file.name);
      }
    }

    submitting = false;
    submitted  = true;
    render();

  } catch (err) {
    console.error('Submit error:', err);
    submitting = false;
    submitErr  = t('Something went wrong: ', 'Ошибка: ') + err.message;
    render();
  }
}

// ── Reset ──
function startOver() {
  D.name = D.phone = D.email = D.comment = '';
  D.files    = [];
  step       = 1;
  fromReview = false;
  submitting = false;
  submitted  = false;
  submitErr  = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Boot ──
applyLang();
</script>
</body>
</html>
