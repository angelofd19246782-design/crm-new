// ── Case workspace ─────────────────────────────────────────────────────────────

async function openCase(id) {
  prevView = currentView || 'apps';
  currentId = id; isNew = false;
  const [rApp, rNotes, rAtts] = await Promise.all([
    fetch(`/api/applications/${id}`),
    fetch(`/api/applications/${id}/notes`),
    fetch(`/api/applications/${id}/attachments`),
  ]);
  if (!rApp.ok) return;
  caseApp   = await rApp.json();
  caseNotes = rNotes.ok ? await rNotes.json() : [];
  caseAtts  = rAtts.ok  ? await rAtts.json()  : [];
  showView('case');
  renderCase();
}

function closeCase() {
  showView(prevView || 'apps');
}

function renderCase() {
  const a = caseApp;
  if (!a) return;

  // Left panel header
  document.getElementById('caseNum').textContent = `#${a.queue_number||a.id}`;
  document.getElementById('caseBreadcrumb').textContent = t('Applications','Заявки');

  // Identity
  document.getElementById('caseAv').textContent = a.name.charAt(0).toUpperCase();
  document.getElementById('caseName').textContent = a.name;
  updateCaseStageBtn(a.status);

  // Assignment
  updateCaseAssignBtn(a.assigned_employee_id, a.assigned_username);

  // Contact fields
  document.getElementById('cf-phone').textContent = a.phone || '—';
  document.getElementById('cf-email').textContent = a.email || '—';
  document.getElementById('cf-source').textContent = a.source || '—';
  document.getElementById('cf-created').textContent = fd(a.created_at);

  // Age
  const ageEl = document.getElementById('cf-age');
  if (ageEl && a.created_at) {
    const days = Math.floor((Date.now() - new Date(a.created_at)) / 86400000);
    ageEl.textContent = days === 0 ? t('today','сегодня') : days === 1 ? t('1 day','1 день') : `${days} ${t('days','дней')}`;
    ageEl.className = 'case-age-val ' + (days >= 7 ? 'age-urgent' : days >= 3 ? 'age-warn' : 'age-ok');
  }

  // Next stage button
  updateNextStageBtn(a.status);

  // Compose avatar
  const av = document.getElementById('composeAv');
  if (av) av.textContent = currentUsername.charAt(0).toUpperCase();

  // Timeline
  renderCaseTl();
}

function updateCaseStageBtn(status) {
  const btn = document.getElementById('caseStageBtn');
  if (!btn) return;
  const labels = { new: t('New','Новая'), in_progress: t('In Progress','В работе'), completed: t('Completed','Завершено'), incomplete: t('Incomplete','Незавершено') };
  btn.className = `case-stage-btn s-${status}`;
  btn.querySelector('#caseStageLabel').textContent = labels[status] || status;
  // Mark active in popover
  ['new','in_progress','completed','incomplete'].forEach(s => {
    document.getElementById(`ps-${s}`)?.classList.toggle('active', s === status);
  });
}

function updateCaseAssignBtn(empId, empName) {
  const av   = document.getElementById('caseAssignAv');
  const name = document.getElementById('caseAssignName');
  if (!av || !name) return;
  if (empId && empName) {
    av.className = 'case-assign-av';
    av.textContent = x(empName).charAt(0).toUpperCase();
    name.className = 'case-assign-name';
    name.textContent = empName;
  } else {
    av.className = 'case-assign-av unset';
    av.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>`;
    name.className = 'case-assign-name unset';
    name.textContent = t('Unassigned','Не назначено');
  }
}

function updateNextStageBtn(status) {
  const btn = document.getElementById('nextStageBtn');
  const txt = document.getElementById('nextStageTxt');
  if (!btn || !txt) return;
  const next = { new: 'in_progress', in_progress: 'completed' };
  const nextLabel = {
    in_progress: t('Move to In Progress','В работу'),
    completed:   t('Mark Completed','Завершить'),
  };
  const ns = next[status];
  if (ns) {
    btn.disabled = false;
    txt.textContent = nextLabel[ns];
  } else {
    btn.disabled = true;
    txt.textContent = status === 'completed' ? t('Completed ✓','Завершено ✓') : t('No next stage','Нет след. этапа');
  }
}

function renderCaseTl() {
  const el = document.getElementById('caseTl');
  if (!el) return;
  const a = caseApp;
  const events = [];

  events.push({ type:'system', color:'d-blue', text: t('Application created','Заявка создана'), time: a.created_at, sort: new Date(a.created_at||0).getTime() });
  if (a.comment?.trim()) {
    events.push({ type:'client-comment', text: a.comment, name: a.name, time: a.created_at, sort: new Date(a.created_at||0).getTime() + 1 });
  }
  caseNotes.forEach(n => events.push({ type:'note', id:n.id, text: n.content, author: n.username||'?', time: n.created_at, sort: new Date(n.created_at||0).getTime() }));
  caseAtts.forEach(att => events.push({ type:'file', id:att.id, name: att.file_name, url:`/api/attachments/${att.id}/view`, author: att.uploaded_by||t('System','Система'), time: att.created_at, sort: new Date(att.created_at||0).getTime() }));
  events.sort((a,b) => a.sort - b.sort);

  el.innerHTML = events.map(renderCaseTlItem).join('');
}

function renderCaseTlItem(ev) {
  const attachSvg = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13"/></svg>`;
  const delSvg = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`;

  if (ev.type === 'system') {
    return `<div class="tl-system">
      <div class="tl-sys-dot-col"><div class="tl-sys-dot ${ev.color||''}"></div></div>
      <span class="tl-sys-text">${x(ev.text)}</span>
      <span class="tl-sys-time">${fd(ev.time)}</span>
    </div>`;
  }
  if (ev.type === 'client-comment') {
    return `<div class="tl-note">
      <div class="tl-av tl-av-client">${x(ev.name).charAt(0).toUpperCase()}</div>
      <div class="tl-note-body">
        <div class="tl-note-hdr"><span class="tl-client-lbl">${t('Client comment','Комментарий клиента')}</span><span class="tl-note-time" style="margin-left:auto">${fd(ev.time)}</span></div>
        <p class="tl-note-text">${x(ev.text)}</p>
      </div>
    </div>`;
  }
  if (ev.type === 'note') {
    return `<div class="tl-note" id="tl-note-${ev.id}">
      <div class="tl-av">${x(ev.author).charAt(0).toUpperCase()}</div>
      <div class="tl-note-body">
        <div class="tl-note-hdr">
          <strong class="tl-note-author">${x(ev.author)}</strong>
          <span class="tl-note-time">${fd(ev.time)}</span>
          <button class="tl-note-del" onclick="deleteCaseNote(${ev.id})">${delSvg}</button>
        </div>
        <p class="tl-note-text">${x(ev.text)}</p>
      </div>
    </div>`;
  }
  if (ev.type === 'file') {
    return `<div class="tl-note" id="tl-att-${ev.id}">
      <div class="tl-av tl-av-file">${attachSvg}</div>
      <div class="tl-note-body">
        <div class="tl-note-hdr">
          <a class="tl-file-link" href="${ev.url}" target="_blank">${x(ev.name)}</a>
          <span class="tl-note-time" style="margin-left:auto">${fd(ev.time)}</span>
          <button class="tl-note-del" onclick="deleteCaseAtt(${ev.id})">${delSvg}</button>
        </div>
        <span class="tl-file-meta">${x(ev.author)} ${t('attached this file','прикрепил(а) файл')}</span>
      </div>
    </div>`;
  }
  return '';
}

  const btn  = document.getElementById('caseStageBtn');
  const rect = btn.getBoundingClientRect();

  if (p) p.style.display = 'none';
  stagePopOpen = false;
  document.removeEventListener('click', _closeStagePop);
}

async function changeStageFromCase(newStatus) {
  closeStagePopover();
  if (!caseApp || caseApp.status === newStatus) return;
  const r = await fetch(`/api/applications/${caseApp.id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ ...caseApp, status: newStatus }),
  });
  if (r.ok) {
    caseApp.status = newStatus;
    updateCaseStageBtn(newStatus);
    updateNextStageBtn(newStatus);
    loadApps(); loadStats();
  }
}

  if (p) p.style.display = 'none';

async function assignFromCase(empId, empName) {
  closeAssignPopover();
  if (!caseApp) return;
  const update = { ...caseApp, assigned_employee_id: empId || null };
  const r = await fetch(`/api/applications/${caseApp.id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(update),
  });
  if (r.ok) {
    caseApp.assigned_employee_id = empId || null;
    caseApp.assigned_username = empName || null;
    updateCaseAssignBtn(empId, empName);
    loadApps();
  }
}

// Inline field editing (phone, email, source)
function startCaseEdit(field) {
  const span = document.getElementById(`cf-${field}`);
  if (!span || span.tagName === 'INPUT') return;
  const original = span.textContent === '—' ? '' : span.textContent;
  const input = document.createElement('input');
  input.className = 'case-field-input';
  input.value = original;
  const save = async () => {
    const val = input.value.trim();
    span.textContent = val || '—';
    input.replaceWith(span);
    if (val !== original && caseApp) {
      const update = { ...caseApp, [field]: val };
      const r = await fetch(`/api/applications/${caseApp.id}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(update),
      });
      if (r.ok) { caseApp[field] = val; loadApps(); }
    }
  };
  input.onblur = save;
  input.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } if (e.key === 'Escape') { input.value = original; input.blur(); } };
  span.replaceWith(input);
  input.focus(); input.select();
}

// Notes
async function addCaseNote() {
  const input = document.getElementById('caseNoteInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text || !currentId) return;
  const btn = document.getElementById('caseNoteBtn');
  if (btn) btn.disabled = true;
  const r = await fetch(`/api/applications/${currentId}/notes`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ content: text }),
  });
  if (btn) btn.disabled = false;
  if (r.ok) {
    input.value = ''; input.style.height = '';
    const nr = await fetch(`/api/applications/${currentId}/notes`);
    if (nr.ok) { caseNotes = await nr.json(); renderCaseTl(); scrollTlToBottom(); }
  }
}

async function deleteCaseNote(noteId) {
  if (!confirm(t('Delete this note?','Удалить заметку?'))) return;
  const r = await fetch(`/api/applications/${currentId}/notes/${noteId}`, { method:'DELETE' });
  if (r.ok) { caseNotes = caseNotes.filter(n => n.id !== noteId); renderCaseTl(); }
  else {
    const nr = await fetch(`/api/applications/${currentId}/notes`);
    if (nr.ok) { caseNotes = await nr.json(); renderCaseTl(); }
  }
}

// File upload
async function caseUploadFile() {
  const input = document.getElementById('caseFileInput');
  if (!input?.files.length || !currentId) return;
  const fd2 = new FormData(); fd2.append('file', input.files[0]);
  const r = await fetch(`/api/applications/${currentId}/attachments`, { method:'POST', body: fd2 });
  input.value = '';
  if (r.ok) {
    const ar = await fetch(`/api/applications/${currentId}/attachments`);
    if (ar.ok) { caseAtts = await ar.json(); renderCaseTl(); scrollTlToBottom(); }
  } else {
    const d = await r.json().catch(()=>({}));
    alert(d.error || t('Upload failed.','Ошибка загрузки.'));
  }
}

async function deleteCaseAtt(attId) {
  if (!confirm(t('Delete this file?','Удалить файл?'))) return;
  const r = await fetch(`/api/attachments/${attId}`, { method:'DELETE' });
  if (r.ok) { caseAtts = caseAtts.filter(a => a.id !== attId); renderCaseTl(); }
}

// Action bar
async function moveToNextStage() {
  if (!caseApp) return;
  const next = { new:'in_progress', in_progress:'completed' };
  const ns = next[caseApp.status];
  if (ns) await changeStageFromCase(ns);
}

async function archiveCase() {
  if (!confirm(t('Move to trash?','Переместить в корзину?'))) return;
  const r = await fetch(`/api/applications/${currentId}`, { method:'DELETE' });
  if (r.ok) { closeCase(); await Promise.all([loadApps(), loadStats()]); }
}

      <div class="fg"><label>${t('Status', 'Статус')}</label><select id="d_status">${statusOpts('new')}</select></div>
      <div class="fg"><label>${t('Assign to', 'Назначить')}</label><select id="d_emp"><option value="">${t('— Unassigned —', '— Не назначено —')}</option>${empOpts}</select></div>
      <div class="fg span2"><label>${t('Comment', 'Комментарий')}</label><textarea id="d_comment" placeholder="${t('Any additional details\u2026', 'Дополнительная информация\u2026')}"></textarea></div>
    </div>
  `;
  document.getElementById('drawerFoot').innerHTML = `
    <div></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">${t('Cancel', 'Отмена')}</button>
      <button class="btn btn-primary btn-sm" onclick="saveApp()">${t('Create', 'Создать')}</button>
    </div>
  `;
  openDrawer();
}

async function saveApp() {
  const name = document.getElementById('d_name').value.trim();
  if (!name) { alert(t('Name is required.', 'Имя обязательно.')); return; }
  const saveBtn = document.querySelector('#drawerFoot .btn-primary');
  if (saveBtn) saveBtn.disabled = true;
  const body = {
    name,
    phone:                document.getElementById('d_phone').value.trim(),
    email:                document.getElementById('d_email').value.trim(),
    source:               document.getElementById('d_source').value.trim(),
    status:               document.getElementById('d_status').value,
    assigned_employee_id: document.getElementById('d_emp').value || null,
    comment:              document.getElementById('d_comment').value.trim(),
  };
  const url    = isNew ? '/api/applications' : `/api/applications/${currentId}`;
  const method = isNew ? 'POST' : 'PUT';
  const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (saveBtn) saveBtn.disabled = false;
  if (r.ok) { closeDrawer(); await Promise.all([loadApps(), loadStats()]); }
  else { const d = await r.json(); alert(d.error || t('Error saving.', 'Ошибка сохранения.')); }
}


function statusOpts(cur) {
  return [
    ['new',         t('New', 'Новый')],
    ['in_progress', t('In Progress', 'В работе')],
    ['completed',   t('Completed', 'Завершено')],
    ['incomplete',  t('Incomplete', 'Незавершено')],
  ].map(([v, l]) => `<option value="${v}" ${cur === v ? 'selected' : ''}>${l}</option>`).join('');
}

function x(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sl(s) {
  const map = { new: t('New','Новый'), in_progress: t('In Progress','В работе'), completed: t('Completed','Завершено'), incomplete: t('Incomplete','Незавершено') };
  return map[s] || s;
}
function fd(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' });
}
function flash(el, type, msg) {
  el.innerHTML = `<div class="alert alert-${type === 'ok' ? 'ok' : 'err'}">${x(msg)}</div>`;
  setTimeout(() => el.innerHTML = '', 3500);
}
async function logout() {
  await fetch('/auth/logout', { method: 'POST' });
  location.href = '/login';
}

function dragStart(e, id, fromStatus) {
  isDragging = true;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('application/json', JSON.stringify({ id, fromStatus }));
  setTimeout(() => e.currentTarget && e.currentTarget.classList.add('dragging'), 0);
}

function dragEnd(e) {
  isDragging = false;
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.board-col.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

async function drop(e, toStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  let data;
  try { data = JSON.parse(e.dataTransfer.getData('application/json')); } catch { return; }
  const { id, fromStatus } = data;
  if (fromStatus === toStatus) return;
  const r = await fetch(`/api/applications/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: toStatus }),
  });
  if (r.ok) {
    const app = allApps.find(a => a.id === id);
    if (app) app.status = toStatus;
    renderApps();
    loadStats();
  } else {
    renderApps();
  }
}

function copyBotLink() {
  closeUserMenu();
  const url = window.location.origin + '/bot';
  const txtEl = document.getElementById('tnTxtCopyLink');
  if (!txtEl) { navigator.clipboard.writeText(url).catch(() => {}); return; }
  const prev = txtEl.textContent;
  navigator.clipboard.writeText(url).then(() => {
    txtEl.textContent = t('Link copied!', 'Ссылка скопирована!');
    setTimeout(() => { txtEl.textContent = prev; }, 2000);
  }).catch(() => window.open(url, '_blank'));
}

document.addEventListener('click', (e) => {
  const userZone = document.getElementById('tnUserAvBtn')?.contains(e.target) || document.getElementById('tnDropdown')?.contains(e.target);
  if (!userZone) closeUserMenu();
});

applyLang();
init();

// Auto-refresh every 5 seconds — skip when case workspace is open or user is dragging
setInterval(() => {
  if (currentView !== 'case' && !document.getElementById('drawer').classList.contains('open') && !isDragging) {
    loadApps();
    loadStats();
  }
}, 5000);
</script>
</body>
</html>
